# Docker Compose for Local Development
# Agentic AI Family Health Manager

version: '3.9'

services:
  # ==========================================
  # APPLICATION
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: health-manager-app
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=health_manager
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - NEO4J_DATABASE=neo4j
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    volumes:
      - ./Backend:/app
      - app-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      azurite:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - health-manager-network
    restart: unless-stopped

  # ==========================================
  # POSTGRESQL
  # ==========================================
  postgres:
    image: postgres:17-alpine
    container_name: health-manager-postgres
    environment:
      - POSTGRES_DB=health_manager
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health-manager-network
    restart: unless-stopped

  # ==========================================
  # NEO4J
  # ==========================================
  neo4j:
    image: neo4j:5.15.0
    container_name: health-manager-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2g
      - NEO4J_dbms_memory_pagecache_size=1g
      - NEO4J_server_bolt_listen__address=:7687
      - NEO4J_server_http_listen__address=:7474
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/import
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health-manager-network
    restart: unless-stopped

  # ==========================================
  # AZURE STORAGE EMULATOR (AZURITE)
  # ==========================================
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: health-manager-azurite
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --loose
    ports:
      - "10000:10000"  # Blob service
    volumes:
      - azurite-data:/data
    networks:
      - health-manager-network
    restart: unless-stopped

  # ==========================================
  # REDIS
  # ==========================================
  redis:
    image: redis:7.2-alpine
    container_name: health-manager-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health-manager-network
    restart: unless-stopped

  # ==========================================
  # ELASTICSEARCH (Optional)
  # ==========================================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: health-manager-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - health-manager-network
    restart: unless-stopped
    profiles:
      - full

# ==========================================
# VOLUMES
# ==========================================
volumes:
  postgres-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  neo4j-import:
    driver: local
  neo4j-plugins:
    driver: local
  azurite-data:
    driver: local
  redis-data:
    driver: local
  elasticsearch-data:
    driver: local
  app-logs:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  health-manager-network:
    driver: bridge
